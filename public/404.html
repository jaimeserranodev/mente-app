<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var path = window.location.pathname.replace('/mente-app', '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        '/mente-app/?p=' + encodeURIComponent(path + search) + hash
      );
    </script>
  </head>
  <body></body>
</html>
